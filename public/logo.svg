<svg width="512" height="512" viewBox="0 0 16 16" style="image-rendering: pixelated;" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="16" height="16" fill="#fef6ee"/>
  <!-- Ears -->
  <rect x="3" y="2" width="2" height="2" fill="#e8805c"/>
  <rect x="11" y="2" width="2" height="2" fill="#e8805c"/>
  <!-- Ear insides -->
  <rect x="4" y="3" width="1" height="1" fill="#f4a0b4"/>
  <rect x="11" y="3" width="1" height="1" fill="#f4a0b4"/>
  <!-- Head -->
  <rect x="4" y="4" width="8" height="5" fill="#e8805c"/>
  <rect x="3" y="5" width="1" height="3" fill="#e8805c"/>
  <rect x="12" y="5" width="1" height="3" fill="#e8805c"/>
  <!-- Eyes -->
  <rect x="5" y="5" width="2" height="2" fill="#3d2c1e"/>
  <rect x="9" y="5" width="2" height="2" fill="#3d2c1e"/>
  <!-- Eye shine -->
  <rect x="5" y="5" width="1" height="1" fill="white"/>
  <rect x="9" y="5" width="1" height="1" fill="white"/>
  <!-- Nose -->
  <rect x="7" y="7" width="2" height="1" fill="#f4a0b4"/>
  <!-- Mouth -->
  <rect x="6" y="8" width="1" height="1" fill="#d06a48"/>
  <rect x="9" y="8" width="1" height="1" fill="#d06a48"/>
  <!-- Body -->
  <rect x="4" y="9" width="8" height="4" fill="#e8805c"/>
  <rect x="3" y="10" width="1" height="2" fill="#e8805c"/>
  <rect x="12" y="10" width="1" height="2" fill="#e8805c"/>
  <!-- Belly -->
  <rect x="6" y="10" width="4" height="2" fill="#fff8f2"/>
  <!-- Paws -->
  <rect x="4" y="13" width="2" height="1" fill="#f4a0b4"/>
  <rect x="10" y="13" width="2" height="1" fill="#f4a0b4"/>
  <!-- Tail -->
  <rect x="12" y="11" width="1" height="1" fill="#e8805c"/>
  <rect x="13" y="10" width="1" height="1" fill="#e8805c"/>
  <rect x="14" y="9" width="1" height="1" fill="#e8805c"/>
</svg>
